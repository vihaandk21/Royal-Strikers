<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sys Config</title>
    <style>
        body { font-family: monospace; background: #000; color: #0f0; padding: 2rem; }
        button { padding: 1rem 2rem; margin-top: 1rem; background: #222; color: #0f0; border: 1px solid #0f0; font-family: monospace; font-size: 1.2rem; font-weight: bold;}
        button:hover { background: #0f0; color: #000; cursor: pointer; }
    </style>
</head>
<body>
    <h2>System Configuration</h2>
    <p>Target: Live Servers (Vercel)</p>
    <p>No token required. System state syncs instantly globally.</p>
    
    <button onclick="toggleSystem('offline')" style="color: #f00; border-color: #f00;">SHUTDOWN SYSTEM</button>
    <button onclick="toggleSystem('online')">POWER ON SYSTEM</button>

    <p id="log" style="margin-top: 2rem; white-space: pre-wrap; font-size: 1.1rem;"></p>

    <script>
        const DB_ID = "ff8081819d82fab6019eff1acc6c5e5e";
        const API_URL = `https://api.restful-api.dev/objects/${DB_ID}`;

        async function toggleSystem(targetStatus) {
            const logEl = document.getElementById('log');
            logEl.innerText = `[1/1] Broadcasting ${targetStatus} command globally...`;
            
            try {
                const putRes = await fetch(API_URL, {
                    method: "PUT",
                    headers: { "Content-Type": "application/json" },
                    body: JSON.stringify({
                        name: "RoyalStrikersStatus",
                        data: { status: targetStatus }
                    })
                });

                if (!putRes.ok) throw new Error("Failed to update global database.");

                logEl.innerText += `\n\nSUCCESS: System is now ${targetStatus.toUpperCase()}.\nNote: Because we upgraded to an external database, the shutdown is INSTANT. No need to wait for Vercel to rebuild!`;
                
            } catch (err) {
                logEl.innerText += `\nERROR: ${err.message}`;
            }
        }
    </script>
</body>
</html>
