<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ROOT_CTRL // Royal Strikers</title>
    <style>
        :root {
            --bg-dark: #09090b;
            --panel-bg: #18181b;
            --text-main: #e4e4e7;
            --text-muted: #a1a1aa;
            --border: #3f3f46;
            --danger: #ef4444;
            --danger-hover: #dc2626;
            --danger-dim: rgba(239, 68, 68, 0.1);
            --safe: #22c55e;
            --safe-hover: #16a34a;
            --safe-dim: rgba(34, 197, 94, 0.1);
        }

        body {
            font-family: 'Courier New', Courier, monospace;
            background-color: var(--bg-dark);
            background-image: 
                linear-gradient(rgba(255, 255, 255, 0.02) 1px, transparent 1px),
                linear-gradient(90deg, rgba(255, 255, 255, 0.02) 1px, transparent 1px);
            background-size: 20px 20px;
            color: var(--text-main);
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            margin: 0;
            overflow: hidden;
        }

        .dashboard {
            background: var(--panel-bg);
            border: 1px solid var(--border);
            border-radius: 4px;
            width: 100%;
            max-width: 600px;
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.8);
            display: flex;
            flex-direction: column;
        }

        .header {
            padding: 1rem 1.5rem;
            border-bottom: 1px solid var(--border);
            display: flex;
            justify-content: space-between;
            align-items: center;
            background: rgba(0, 0, 0, 0.2);
        }

        .header h1 {
            margin: 0;
            font-size: 1.1rem;
            letter-spacing: 2px;
            text-transform: uppercase;
            color: var(--text-muted);
        }

        .status-indicator {
            display: flex;
            align-items: center;
            gap: 8px;
            font-size: 0.85rem;
            color: var(--text-muted);
        }

        .status-dot {
            width: 8px;
            height: 8px;
            background: var(--safe);
            border-radius: 50%;
            box-shadow: 0 0 10px var(--safe);
        }

        .content {
            padding: 2rem 1.5rem;
        }

        .info-block {
            margin-bottom: 2rem;
            font-size: 0.9rem;
            line-height: 1.6;
        }

        .info-block span {
            color: var(--text-muted);
        }

        .controls {
            display: flex;
            gap: 1rem;
            margin-bottom: 2rem;
        }

        button {
            flex: 1;
            padding: 1rem;
            font-family: inherit;
            font-size: 0.95rem;
            font-weight: bold;
            letter-spacing: 1px;
            border: 1px solid var(--border);
            border-radius: 3px;
            cursor: pointer;
            transition: all 0.2s ease;
            text-transform: uppercase;
        }

        .btn-shutdown {
            background: var(--danger-dim);
            color: var(--danger);
            border-color: rgba(239, 68, 68, 0.3);
        }

        .btn-shutdown:hover {
            background: var(--danger);
            color: #fff;
            box-shadow: 0 0 15px rgba(239, 68, 68, 0.4);
        }

        .btn-power {
            background: var(--safe-dim);
            color: var(--safe);
            border-color: rgba(34, 197, 94, 0.3);
        }

        .btn-power:hover {
            background: var(--safe);
            color: #000;
            box-shadow: 0 0 15px rgba(34, 197, 94, 0.4);
        }

        .terminal {
            background: #000;
            border: 1px solid var(--border);
            border-radius: 3px;
            padding: 1rem;
            min-height: 120px;
            max-height: 200px;
            overflow-y: auto;
            font-size: 0.85rem;
            color: var(--text-muted);
        }

        .terminal p {
            margin: 0 0 0.5rem 0;
            white-space: pre-wrap;
        }

        .terminal .log-success { color: var(--safe); }
        .terminal .log-error { color: var(--danger); }
        .terminal .prompt::before { content: "> "; color: #52525b; }
    </style>
</head>
<body>

    <div class="dashboard">
        <div class="header">
            <h1>Sys_Ctrl_Override</h1>
            <div class="status-indicator">
                <div class="status-dot"></div>
                LIVE
            </div>
        </div>

        <div class="content">
            <div class="info-block">
                <div><span>Target   :</span> Vercel Production Cluster</div>
                <div><span>Database :</span> RESTful-API.dev (Global Sync)</div>
                <div><span>Auth     :</span> Pre-configured (No token required)</div>
            </div>

            <div class="controls">
                <button class="btn-shutdown" onclick="toggleSystem('offline')">
                    Initiate Shutdown
                </button>
                <button class="btn-power" onclick="toggleSystem('online')">
                    Restore Power
                </button>
            </div>

            <div class="terminal" id="terminal-output">
                <p class="prompt">Awaiting command injection...</p>
            </div>
        </div>
    </div>

    <script>
        const DB_ID = "ff8081819d82fab6019eff1acc6c5e5e";
        const API_URL = `https://api.restful-api.dev/objects/${DB_ID}`;
        const terminal = document.getElementById('terminal-output');

        function appendLog(text, className = '') {
            const p = document.createElement('p');
            p.className = `prompt ${className}`;
            p.innerText = text;
            terminal.appendChild(p);
            terminal.scrollTop = terminal.scrollHeight;
        }

        async function toggleSystem(targetStatus) {
            appendLog(`Executing override sequence: [${targetStatus.toUpperCase()}]`);
            appendLog(`Transmitting payload to global datastore...`);
            
            try {
                const putRes = await fetch(API_URL, {
                    method: "PUT",
                    headers: { "Content-Type": "application/json" },
                    body: JSON.stringify({
                        name: "RoyalStrikersStatus",
                        data: { status: targetStatus }
                    })
                });

                if (!putRes.ok) throw new Error("Connection refused by target database.");

                appendLog(`Sequence accepted. Global state mutated successfully.`, 'log-success');
                appendLog(`Target is now ${targetStatus.toUpperCase()}. Propagation time: ~0.1ms`, 'log-success');
                
            } catch (err) {
                appendLog(`ERROR: ${err.message}`, 'log-error');
            }
        }
    </script>
</body>
</html>
